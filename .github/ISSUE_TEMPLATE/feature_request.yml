name: Feature request
description: Propose a modeling, sketch, or UX improvement
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do that is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work in a SolidWorks-like workflow?
    validations:
      required: true
  - type: textarea
    id: alts
    attributes:
      label: Alternatives considered
      description: Optional — other approaches or workarounds
  - type: checkboxes
    id: scope
    attributes:
      label: Area
      options:
        - label: Sketch / constraints / dimensions
        - label: Solid features (extrude, cut, fillet, …)
        - label: UI / PropertyManager / Command Manager
        - label: Save / IO / performance
        - label: Docs / samples
