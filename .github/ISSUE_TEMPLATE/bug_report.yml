name: Bug report
description: Something broke or behaved incorrectly
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Clear repro steps help us fix faster.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Expected vs actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. New part
        2. Sketch on Front
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Environment
      placeholder: "OS / Python 3.12 / WSL? / commit hash"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste traceback or attach a screenshot
